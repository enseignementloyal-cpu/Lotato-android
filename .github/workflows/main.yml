name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1'

      - name: Organiser et corriger les fichiers
        run: |
          set -e
          mkdir -p app/src/main/java/com/lotato/pro/activities
          mkdir -p app/src/main/java/com/lotato/pro/api
          mkdir -p app/src/main/java/com/lotato/pro/models
          mkdir -p app/src/main/java/com/lotato/pro/print
          mkdir -p app/src/main/java/com/lotato/pro/utils
          mkdir -p app/src/main/java/com/sunmi/peripheral/printer
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          move() {
            f=$(find . -name "$1" -not -path "./.git/*" -not -path "*/com/sunmi/*" | head -1)
            [ -n "$f" ] && cp "$f" "$2" && echo "OK: $1 -> $2" || echo "SKIP: $1 non trouve"
          }

          move "AndroidManifest.xml"         app/src/main/AndroidManifest.xml
          move "BettingActivity.java"        app/src/main/java/com/lotato/pro/activities/BettingActivity.java
          move "DrawSelectionFragment.java"  app/src/main/java/com/lotato/pro/activities/DrawSelectionFragment.java
          move "HistoryFragment.java"        app/src/main/java/com/lotato/pro/activities/HistoryFragment.java
          move "LoginActivity.java"          app/src/main/java/com/lotato/pro/activities/LoginActivity.java
          move "MainActivity.java"           app/src/main/java/com/lotato/pro/activities/MainActivity.java
          move "ReportsFragment.java"        app/src/main/java/com/lotato/pro/activities/ReportsFragment.java
          move "WinnersFragment.java"        app/src/main/java/com/lotato/pro/activities/WinnersFragment.java
          move "ApiService.java"             app/src/main/java/com/lotato/pro/api/ApiService.java
          move "AppSession.java"             app/src/main/java/com/lotato/pro/models/AppSession.java
          move "Bet.java"                    app/src/main/java/com/lotato/pro/models/Bet.java
          move "Draw.java"                   app/src/main/java/com/lotato/pro/models/Draw.java
          move "Ticket.java"                 app/src/main/java/com/lotato/pro/models/Ticket.java
          move "SunmiPrintHelper.java"       app/src/main/java/com/lotato/pro/print/SunmiPrintHelper.java
          move "GameEngine.java"             app/src/main/java/com/lotato/pro/utils/GameEngine.java
          move "btn_primary_bg.xml"          app/src/main/res/drawable/btn_primary_bg.xml
          move "btn_success_bg.xml"          app/src/main/res/drawable/btn_success_bg.xml
          move "card_bg.xml"                 app/src/main/res/drawable/card_bg.xml
          move "chip_active_bg.xml"          app/src/main/res/drawable/chip_active_bg.xml
          move "chip_bg.xml"                 app/src/main/res/drawable/chip_bg.xml
          move "draw_card_active_bg.xml"     app/src/main/res/drawable/draw_card_active_bg.xml
          move "draw_card_bg.xml"            app/src/main/res/drawable/draw_card_bg.xml
          move "ic_launcher.xml"             app/src/main/res/drawable/ic_launcher.xml
          move "input_bg.xml"                app/src/main/res/drawable/input_bg.xml
          move "login_bg.xml"                app/src/main/res/drawable/login_bg.xml
          move "login_card_bg.xml"           app/src/main/res/drawable/login_card_bg.xml
          move "activity_betting.xml"        app/src/main/res/layout/activity_betting.xml
          move "activity_login.xml"          app/src/main/res/layout/activity_login.xml
          move "activity_main.xml"           app/src/main/res/layout/activity_main.xml
          move "fragment_draw_selection.xml" app/src/main/res/layout/fragment_draw_selection.xml
          move "fragment_history.xml"        app/src/main/res/layout/fragment_history.xml
          move "fragment_reports.xml"        app/src/main/res/layout/fragment_reports.xml
          move "fragment_winners.xml"        app/src/main/res/layout/fragment_winners.xml
          move "item_bet_row.xml"            app/src/main/res/layout/item_bet_row.xml
          move "item_draw_card.xml"          app/src/main/res/layout/item_draw_card.xml
          move "item_ticket_card.xml"        app/src/main/res/layout/item_ticket_card.xml
          move "item_winner_card.xml"        app/src/main/res/layout/item_winner_card.xml
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-hdpi/ic_launcher.xml
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-xhdpi/ic_launcher.xml
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-xxhdpi/ic_launcher.xml
          move "colors.xml"                  app/src/main/res/values/colors.xml
          move "strings.xml"                 app/src/main/res/values/strings.xml
          move "themes.xml"                  app/src/main/res/values/themes.xml
          move "gradle-wrapper.properties"   gradle/wrapper/gradle-wrapper.properties
          move "proguard-rules.pro"          app/proguard-rules.pro

      - name: Ecrire fichiers Gradle et stubs Sunmi
        run: |
          python3 << 'PYEOF'
          import os

          os.makedirs("app/src/main/java/com/sunmi/peripheral/printer", exist_ok=True)

          open("build.gradle","w").write(
          "buildscript {\n"
          "    repositories { google(); mavenCentral() }\n"
          "    dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }\n"
          "}\n"
          "allprojects {\n"
          "    repositories { google(); mavenCentral() }\n"
          "}\n")

          open("settings.gradle","w").write(
          'rootProject.name = "LotatoPro"\n'
          "include ':app'\n")

          open("app/build.gradle","w").write(
          "apply plugin: 'com.android.application'\n"
          "android {\n"
          "    namespace 'com.lotato.pro'\n"
          "    compileSdk 34\n"
          "    defaultConfig {\n"
          "        applicationId 'com.lotato.pro'\n"
          "        minSdk 21\n"
          "        targetSdk 34\n"
          "        versionCode 1\n"
          "        versionName '6.0'\n"
          "    }\n"
          "    buildTypes {\n"
          "        release { minifyEnabled false; signingConfig signingConfigs.debug }\n"
          "    }\n"
          "    compileOptions {\n"
          "        sourceCompatibility JavaVersion.VERSION_1_8\n"
          "        targetCompatibility JavaVersion.VERSION_1_8\n"
          "    }\n"
          "}\n"
          "dependencies {\n"
          "    implementation 'androidx.appcompat:appcompat:1.6.1'\n"
          "    implementation 'com.google.android.material:material:1.11.0'\n"
          "    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'\n"
          "    implementation 'androidx.recyclerview:recyclerview:1.3.2'\n"
          "    implementation 'androidx.cardview:cardview:1.0.0'\n"
          "    implementation 'com.squareup.okhttp3:okhttp:4.12.0'\n"
          "    implementation 'com.google.code.gson:gson:2.10.1'\n"
          "}\n")

          sd = "app/src/main/java/com/sunmi/peripheral/printer"

          open(f"{sd}/InnerPrinterCallback.java","w").write(
          "package com.sunmi.peripheral.printer;\n"
          "public abstract class InnerPrinterCallback {\n"
          "    protected abstract void onConnected(SunmiPrinterService service);\n"
          "    protected abstract void onDisconnected();\n"
          "}\n")

          open(f"{sd}/InnerPrinterManager.java","w").write(
          "package com.sunmi.peripheral.printer;\n"
          "import android.content.Context;\n"
          "public class InnerPrinterManager {\n"
          "    private static InnerPrinterManager instance;\n"
          "    public static InnerPrinterManager getInstance() {\n"
          "        if (instance == null) instance = new InnerPrinterManager();\n"
          "        return instance;\n"
          "    }\n"
          "    public void bindService(Context context, InnerPrinterCallback cb) {}\n"
          "    public void unBindService(Context context, Object o) {}\n"
          "}\n")

          open(f"{sd}/SunmiPrinterService.java","w").write(
          "package com.sunmi.peripheral.printer;\n"
          "import android.os.RemoteException;\n"
          "public interface SunmiPrinterService {\n"
          "    void printerInit(Object cb) throws RemoteException;\n"
          "    void setFontSize(float size, Object cb) throws RemoteException;\n"
          "    void setAlignment(int alignment, Object cb) throws RemoteException;\n"
          "    void printText(String text, Object cb) throws RemoteException;\n"
          "    void setBold(boolean bold, Object cb) throws RemoteException;\n"
          "    void lineWrap(int lines, Object cb) throws RemoteException;\n"
          "}\n")

          print("Tous les fichiers ecrits avec succes")
          PYEOF

      - name: Build Debug APK
        run: gradle assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: lotato-pro-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
